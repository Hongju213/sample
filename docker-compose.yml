services:
  oracle:
    image: gvenzl/oracle-xe:21-slim-faststart
    container_name: sample-oracle
    ports:
      - "1521:1521"
    environment:
      ORACLE_PASSWORD: root
      APP_USER: root
      APP_USER_PASSWORD: root
    volumes:
      - oracle-data:/opt/oracle/oradata
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  oracle-data:
