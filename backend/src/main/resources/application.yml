server:
  port: 8080

spring:
  application:
    name: sample-backend
  datasource:
    driver-class-name: oracle.jdbc.OracleDriver
    url: ${DB_URL:jdbc:oracle:thin:@localhost:1521/XEPDB1}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
  flyway:
    enabled: true
    locations: classpath:db/migration
  jackson:
    time-zone: Asia/Seoul

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.example.sample
  configuration:
    map-underscore-to-camel-case: true

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  security:
    username: ${APP_SECURITY_USERNAME:root}
    password: ${APP_SECURITY_PASSWORD:root}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}
