server:
  port: 8080

spring:
  application:
    name: sample-backend
  datasource:
    # Local/test default uses H2 in Oracle compatibility mode.
    # Set DB_DRIVER, DB_URL, DB_USERNAME, and DB_PASSWORD to use Oracle.
    driver-class-name: ${DB_DRIVER:org.h2.Driver}
    url: ${DB_URL:jdbc:h2:mem:sample;MODE=Oracle;DATABASE_TO_UPPER=true;DB_CLOSE_DELAY=-1}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}
  flyway:
    # Enable this only when the target schema should be managed by migrations.
    enabled: ${FLYWAY_ENABLED:false}
    locations: classpath:db/migration
  jackson:
    time-zone: Asia/Seoul

mybatis:
  config-location: classpath:mybatis-config.xml
  mapper-locations: classpath:mybatis/common/**/*.xml
  type-aliases-package: com.example.sample

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  security:
    username: ${APP_SECURITY_USERNAME:root}
    password: ${APP_SECURITY_PASSWORD:root}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
